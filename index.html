<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turki's Tech Station</title>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #00ffff; padding: 30px; border-radius: 20px; background: #111; box-shadow: 0 0 20px #00ffff; text-align: center; width: 80%; }
        h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff; margin-bottom: 20px; }
        .spec { font-size: 1.1rem; margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .label { color: #888; }
        .value { font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ultimate Setup 🚀</h1>
        <div class="spec"><span class="label">GPU:</span> <span class="value">RTX 5090</span></div>
        <div class="spec"><span class="label">CPU:</span> <span class="value">Ryzen 9 9950X3D</span></div>
        <div class="spec"><span class="label">Monitor:</span> <span class="value">4K HDR 144Hz</span></div>
        <p style="margin-top:30px; color:#444; font-size: 0.8rem;">Created by Turki</p>
    </div>
</body>
</html>
